<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão à Vista - CMAA</title>
    <style>
        /* Remove margens e garante que o slide ocupe 100% da tela */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }
        iframe { 
            width: 100vw; 
            height: 100vh; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://docs.google.com/presentation/d/e/2PACX-1vQvFtOFHPP3N9LibGmk3qQD7X4sNT8pnT-eble0j9JQrQy9os7MbIBOzuat9LKXjktSu6o_AAJYvrw6/pubembed?start=true&loop=true&delayms=15000"
        allowfullscreen="true" 
        mozallowfullscreen="true" 
        webkitallowfullscreen="true">
    </iframe>

    <script>
    // 8 minutos em milissegundos
    const tempoParaRefresh = 480000; 
    const iframe = document.querySelector('iframe');
    const urlOriginal = iframe.src;

    setInterval(function(){
        console.log("Atualizando o iframe...");
        
        // Adiciona um parâmetro único para forçar o navegador a buscar o iframe novamente
        // e não usar o cache
        const novaUrl = urlOriginal + "&timestamp=" + new Date().getTime();
        iframe.src = novaUrl;
        
    }, tempoParaRefresh);
</script>

</body>
</html>
