<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão à Vista - CMAA</title>
    <style>
        /* Remove margens e garante que o slide ocupe 100% da tela */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }
        iframe { 
            width: 100vw; 
            height: 100vh; 
            border: none; 
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://docs.google.com/presentation/d/e/2PACX-1vQvFtOFHPP3N9LibGmk3qQD7X4sNT8pnT-eble0j9JQrQy9os7MbIBOzuat9LKXjktSu6o_AAJYvrw6/pubembed?start=true&loop=true&delayms=15000"
        allowfullscreen="true" 
        mozallowfullscreen="true" 
        webkitallowfullscreen="true">
    </iframe>

    <script>
        // Define o tempo em milissegundos para recarregar a PÁGINA INTEIRA.
        // 86400000 ms = 24 horas. 
        // Isso garante que, uma vez por dia, o navegador busque a versão mais atualizada 
        // dos seus slides sem interromper sua visualização ao longo do dia.
        const tempoParaRecarregar = 300000; 

        setTimeout(function(){
            location.reload();
        }, tempoParaRecarregar);
    </script>

</body>
</html>
